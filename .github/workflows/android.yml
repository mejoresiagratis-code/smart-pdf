name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write       # necesario para que el workflow haga commit del proyecto extraido

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # PASO 1: Si el ZIP del starter sigue en el repo, lo extraemos,
      # colocamos el proyecto en la raiz, borramos el ZIP y el gitignore
      # mal nombrado, y hacemos commit de vuelta. Solo ocurre una vez:
      # cuando ya no haya ZIP, este paso no hace nada.
      # ----------------------------------------------------------------
      - name: Normalizar repo (extraer ZIP del starter una sola vez)
        run: |
          set -e
          ZIP=$(ls *.zip 2>/dev/null | head -1 || true)
          if [ -z "$ZIP" ]; then
            echo "-> No hay ZIP. El repo ya esta normalizado."
            exit 0
          fi
          echo "-> Extrayendo $ZIP ..."
          unzip -o "$ZIP" -d _starter_tmp
          SRC=$(find _starter_tmp -maxdepth 3 -name settings.gradle.kts -printf '%h\n' | head -1)
          if [ -z "$SRC" ]; then
            echo "!! No encontre settings.gradle.kts dentro del ZIP. Abortando extraccion."
            rm -rf _starter_tmp
            exit 1
          fi
          echo "-> Proyecto encontrado en: $SRC"
          # Borrar los archivos rotos del bootstrap para que no choquen
          rm -rf app settings.gradle.kts build.gradle.kts gradle.properties
          # Copiar el proyecto bueno (incluye ocultos como .gitignore)
          cp -rf "$SRC"/. .
          # Limpiar
          rm -rf _starter_tmp "$ZIP" gitignore
          # Commit de vuelta al repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "CI: extraer proyecto Android en la raiz y limpiar ZIP"
          git push
          echo "-> Repo normalizado y subido. El propio push relanzara el workflow."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generar Gradle wrapper si falta
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew || true

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
